<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Le.Poá — Roleta da Sorte</title>
<meta name="description" content="Gire a roleta e ganhe descontos exclusivos na Le.Poá! Cupons, frete grátis e brindes esperam por você." />
<meta property="og:title" content="Le.Poá — Roleta da Sorte" />
<meta property="og:description" content="Gire a roleta e ganhe descontos exclusivos!" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://lepoa.online/roleta" />
<meta name="theme-color" content="#2b3220" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ---------- Tokens ---------- */
  :root {
    --olive-900: #2b3220;
    --olive-800: #3a4329;
    --olive-700: #4a5333;
    --olive-600: #5b6440;
    --olive-500: #6f7a4f;
    --olive-400: #8a9468;
    --olive-100: #e8e7dc;
    --olive-50:  #f2f1e8;
    --rose-600: #b68680;
    --rose-500: #c99b94;
    --rose-400: #d9b1aa;
    --rose-300: #e5c5bf;
    --rose-200: #efd6d1;
    --rose-100: #f6e6e2;
    --rose-50:  #faf1ee;
    --gold-700: #95753a;
    --gold-600: #b08a44;
    --gold-500: #c9a05a;
    --gold-400: #d9b677;
    --gold-300: #e6ca9a;
    --gold-100: #f3e5c6;
    --cream:    #f7f3eb;
    --paper:    #faf7f0;
    --ink:      #1e2117;
    --font-display: "Fraunces", "Didot", Georgia, serif;
    --font-sans:    "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:    "JetBrains Mono", ui-monospace, monospace;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 22px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--cream);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
  }

  #root { min-height: 100vh; min-height: 100dvh; }

  /* subtle paper grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1200px 600px at 10% -10%, rgba(201,160,90,0.08), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, rgba(182,134,128,0.10), transparent 55%);
    z-index: 0;
  }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.25;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0.22 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* ---------- Utility ---------- */
  .shell {
    position: relative; z-index: 2;
    min-height: 100dvh;
    display: flex; flex-direction: column;
  }

  .topbar {
    padding: 18px 20px 0;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .wordmark { display: flex; align-items: center; }
  .wordmark img {
    height: 36px; width: auto; display: block;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,0.4));
  }
  .topbar .meta {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--olive-600);
    opacity: 0.8;
  }

  .footer {
    padding: 14px 20px 22px;
    display: flex; justify-content: space-between; gap: 16px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--olive-700);
    opacity: 0.75;
  }

  /* ---------- Screen containers ---------- */
  .screen {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 20px 16px;
  }

  /* ---------- Intro card ---------- */
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--paper);
    border: 1px solid rgba(74,83,51,0.12);
    border-radius: var(--radius-lg);
    padding: 32px 24px 24px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 30px 60px -30px rgba(43,50,32,0.35),
      0 8px 20px -10px rgba(43,50,32,0.15);
    position: relative;
  }
  .card.intro::before {
    content: "";
    position: absolute; inset: 10px;
    border: 1px solid rgba(201,160,90,0.35);
    border-radius: calc(var(--radius-lg) - 6px);
    pointer-events: none;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-700);
    text-align: center;
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ""; height: 1px; flex: 1; max-width: 36px;
    background: linear-gradient(to right, transparent, var(--gold-500), transparent);
  }

  h1.display {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(30px, 8vw, 42px);
    line-height: 1.02;
    letter-spacing: -0.01em;
    text-align: center;
    color: var(--olive-900);
    margin: 0 0 10px;
  }
  h1.display em { font-style: italic; color: var(--rose-600); font-weight: 300; }

  .sublead {
    text-align: center;
    color: var(--olive-700);
    font-size: 14px;
    line-height: 1.55;
    max-width: 32ch;
    margin: 0 auto 22px;
  }

  /* ---------- Form ---------- */
  .field { display: block; margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--olive-700);
    margin-bottom: 7px;
    padding-left: 2px;
  }
  .field input {
    width: 100%;
    font: inherit;
    font-size: 16px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(74,83,51,0.22);
    background: var(--cream);
    color: var(--ink);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .field input::placeholder { color: rgba(74,83,51,0.4); }
  .field input:focus {
    border-color: var(--olive-500);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(111,122,79,0.15);
  }
  .field.error input {
    border-color: var(--rose-600);
    box-shadow: 0 0 0 3px rgba(182,134,128,0.2);
  }
  .field .hint {
    font-size: 11.5px;
    color: var(--rose-600);
    margin-top: 6px;
    padding-left: 2px;
    min-height: 14px;
  }

  /* ---------- Buttons ---------- */
  .btn {
    width: 100%;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 20px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, background .2s;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    text-decoration: none;
  }
  .btn.primary {
    background: var(--olive-800);
    color: var(--cream);
    box-shadow: 0 10px 24px -12px rgba(43,50,32,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .btn.primary:hover { background: var(--olive-900); transform: translateY(-1px); }
  .btn.primary:active { transform: translateY(0); }
  .btn.primary:disabled {
    background: var(--olive-400);
    cursor: not-allowed; opacity: 0.6;
  }
  .btn.ghost {
    background: transparent;
    color: var(--olive-800);
    border: 1px solid rgba(74,83,51,0.25);
  }
  .btn.ghost:hover { background: rgba(74,83,51,0.05); }
  .btn .arrow { font-family: var(--font-display); font-size: 18px; letter-spacing: 0; text-transform: none; }

  .legal {
    margin-top: 14px;
    text-align: center;
    font-size: 11px;
    color: var(--olive-600);
    line-height: 1.5;
  }
  .legal a { color: var(--olive-800); text-decoration: underline; text-underline-offset: 3px; }

  .ornament { display: flex; justify-content: center; margin: 0 auto 20px; color: var(--gold-500); }

  .intro-logo { display: flex; justify-content: center; margin: 0 auto 8px; }
  .intro-logo img { height: 56px; width: auto; display: block; }

  /* ---------- Wheel screen ---------- */
  .wheel-screen {
    width: 100%; max-width: 520px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wheel-heading { text-align: center; margin-bottom: 14px; }
  .wheel-heading h2 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(24px, 6.5vw, 34px);
    color: var(--olive-900);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .wheel-heading h2 em { font-style: italic; color: var(--rose-600); font-weight: 300; }
  .wheel-heading p { color: var(--olive-700); font-size: 14px; margin: 0; }

  .wheel-wrap {
    position: relative;
    width: min(88vw, 400px);
    aspect-ratio: 1/1;
    margin: 14px 0 20px;
    display: flex; align-items: center; justify-content: center;
  }

  .wheel-outer-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      conic-gradient(from 0deg,
        var(--gold-500) 0deg, var(--gold-300) 40deg,
        var(--gold-600) 80deg, var(--gold-400) 130deg,
        var(--gold-500) 180deg, var(--gold-300) 230deg,
        var(--gold-600) 280deg, var(--gold-400) 330deg,
        var(--gold-500) 360deg);
    box-shadow:
      0 26px 50px -20px rgba(43,50,32,0.45),
      0 6px 16px -6px rgba(43,50,32,0.25),
      inset 0 0 0 1px rgba(255,255,255,0.25);
  }
  .wheel-inner-ring {
    position: absolute; inset: 10px;
    border-radius: 50%;
    background: var(--olive-900);
    box-shadow: inset 0 0 0 1px rgba(201,160,90,0.45);
  }

  .wheel-svg {
    position: absolute;
    inset: 22px;
    transition: transform 6s cubic-bezier(0.16, 0.84, 0.25, 1);
    filter: drop-shadow(0 4px 10px rgba(43,50,32,0.2));
  }

  .wheel-hub {
    position: absolute;
    width: 66px; height: 66px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, var(--gold-300) 40%, var(--gold-600) 100%);
    box-shadow:
      0 0 0 6px var(--olive-900),
      0 0 0 7px var(--gold-500),
      0 8px 18px rgba(43,50,32,0.4),
      inset 0 -4px 10px rgba(149,117,58,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
    cursor: pointer;
    transition: transform .15s;
  }
  .wheel-hub:hover { transform: scale(1.04); }
  .wheel-hub:active { transform: scale(0.97); }
  .wheel-hub.spinning { cursor: not-allowed; }
  .wheel-hub .label {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 14px;
    color: var(--olive-900);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .wheel-pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    filter: drop-shadow(0 4px 6px rgba(43,50,32,0.35));
  }

  .spin-cta { margin-top: 8px; max-width: 320px; width: 100%; }

  .day-lock {
    margin-top: 12px;
    padding: 14px 18px;
    background: rgba(182,134,128,0.10);
    border: 1px solid rgba(182,134,128,0.25);
    border-radius: var(--radius-md);
    text-align: center;
    max-width: 360px;
  }
  .day-lock .ttl {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--rose-600);
    margin-bottom: 4px;
  }
  .day-lock .countdown {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--olive-800);
  }

  .name-greeting {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 15px;
    color: var(--rose-600);
    margin-bottom: 4px;
    text-align: center;
  }

  /* ---------- Prize modal ---------- */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(30,33,23,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .3s ease forwards;
  }
  @keyframes fadeIn { from {opacity: 0} to {opacity: 1} }

  .prize-card {
    width: 100%;
    max-width: 400px;
    background: var(--paper);
    border-radius: var(--radius-lg);
    padding: 32px 24px 24px;
    position: relative;
    box-shadow: 0 40px 80px -20px rgba(0,0,0,0.45);
    animation: prizePop .6s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
    border: 1px solid rgba(201,160,90,0.4);
  }
  @keyframes prizePop {
    from { opacity: 0; transform: scale(0.8) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .prize-card::before {
    content: "";
    position: absolute; inset: 10px;
    border: 1px solid rgba(201,160,90,0.3);
    border-radius: calc(var(--radius-lg) - 6px);
    pointer-events: none;
  }

  .prize-eyebrow {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-700);
    text-align: center;
    margin-bottom: 14px;
  }
  .prize-headline {
    font-family: var(--font-display);
    font-weight: 400;
    font-style: italic;
    font-size: clamp(28px, 8vw, 36px);
    color: var(--olive-900);
    text-align: center;
    margin: 0 0 6px;
    line-height: 1.05;
  }
  .prize-sub {
    text-align: center;
    font-size: 14px;
    color: var(--olive-700);
    margin: 0 0 22px;
  }

  .coupon {
    border: 1.5px dashed var(--gold-500);
    border-radius: var(--radius-md);
    padding: 16px;
    background: linear-gradient(180deg, var(--gold-100) 0%, var(--cream) 100%);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .coupon .code {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 0.12em;
    color: var(--olive-900);
  }
  .copy-btn {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--olive-900);
    color: var(--cream);
    border: none;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background .2s, transform .15s;
    white-space: nowrap;
  }
  .copy-btn:hover { background: var(--olive-800); }
  .copy-btn.copied { background: var(--rose-600); }

  .valid {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--olive-600);
    margin: 14px 0 18px;
  }

  .prize-actions { display: grid; grid-template-columns: 1fr; gap: 10px; }

  .close-x {
    position: absolute;
    top: 14px; right: 14px;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(74,83,51,0.2);
    background: transparent;
    color: var(--olive-700);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .close-x:hover { background: rgba(74,83,51,0.08); }

  /* ---------- Confetti ---------- */
  .confetti {
    position: fixed; inset: 0; pointer-events: none; z-index: 60;
    overflow: hidden;
  }
  .confetti span {
    position: absolute;
    top: -20px;
    width: 8px; height: 14px;
    opacity: 0.95;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translate3d(0, -20px, 0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translate3d(var(--dx), 110vh, 0) rotate(720deg); opacity: 0.4; }
  }

  @keyframes tickShake {
    0%,100% { transform: translateX(-50%) rotate(0deg); }
    50%     { transform: translateX(-50%) rotate(-10deg); }
  }
  .wheel-pointer.ticking { animation: tickShake .08s ease; }

  .admin-reset {
    margin-top: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--olive-600);
    background: none; border: none; cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.6;
    display: none; /* hidden from customers */
  }

  /* ---------- Mobile-first adjustments ---------- */
  @media (max-width: 380px) {
    .card { padding: 24px 18px 18px; }
    .wheel-hub { width: 56px; height: 56px; }
    .wheel-hub .label { font-size: 12px; }
    .topbar { padding: 14px 16px 0; }
    .footer { padding: 12px 16px 18px; }
  }

  /* Safe area for notch phones */
  @supports (padding-top: env(safe-area-inset-top)) {
    .topbar { padding-top: calc(18px + env(safe-area-inset-top)); }
    .footer { padding-bottom: calc(22px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body class="theme-oliva-dourado style-elegante">
  <div class="grain"></div>
  <div id="root"></div>

  <script>
    const TWEAK_DEFAULTS = {
      "theme": "oliva-dourado",
      "wheelStyle": "elegante",
      "confetti": true
    };
  </script>

  <script src="/roleta/prizes-store.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="/roleta/app.jsx"></script>
</body>
</html>
